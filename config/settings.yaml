symbols:
  - AAPL
  - MSFT
  - SPY
  - QQQ
  - NVDA

strategy:
  # Mode: scalper (intraday 0.20% targets) or swing (multi-day 2-3% targets)
  mode: swing
  rsi_period: 14
  rsi_oversold: 35
  rsi_overbought: 65
  volume_spike_ratio: 1.5
  vwap_deviation_pct: 0.15
  take_profit_pct: 0.20
  stop_loss_pct: 0.12
  trailing_stop_pct: 0.10

# Swing trading mode settings (active when strategy.mode = swing)
swing:
  # Profit and loss targets (all %)
  take_profit_pct: 2.5          # AI may recommend hold past this
  stop_loss_pct: 1.0            # Dynamic stop (AI can tighten)
  hard_stop_pct: 1.5            # Absolute floor, never overridden
  trailing_stop_pct: 0.5        # Trail from recent high
  profit_lock_pct: 0.8          # Start trailing once up this much
  # Hold duration
  max_hold_days: 5              # Force exit after 5 calendar days
  min_hold_hours: 4.0           # Min hold — avoids same-day close (PDT safe)
  # Entry signals (momentum-based, not mean-reversion)
  entry_min_gap_pct: 0.3        # Must be up >= 0.3% from prev close
  entry_max_gap_pct: 8.0        # Avoid gap-and-crap stocks
  entry_min_volume_ratio: 1.5
  entry_ema_fast: 10
  entry_ema_slow: 20
  entry_max_rsi: 72.0
  # Session behaviour
  flatten_on_close: false       # false = hold overnight (swing style)
  morning_review_time: "08:15"  # AI reviews open positions before open (CST)
  session_end_time: "15:00"     # Trade until regular close (3:00 PM CST = 4:00 PM ET)
  # Sizing — spread capital across many simultaneous swing positions
  max_open_positions: 12
  max_risk_per_trade_pct: 1.5

session:
  timezone: America/Chicago
  start_time: "08:30"         # 8:30 AM CST = 9:30 AM ET market open
  end_time: "10:30"           # scalper only; swing uses swing.session_end_time

risk:
  max_risk_per_trade_pct: 1.0
  daily_max_loss_pct: 2.0
  max_open_positions: 12
  max_equity_pct_per_position: 8.0   # ~8% per name → up to ~12 names diversified
  pdt_equity_threshold: 25000
  max_day_trades: 3

llm:
  enabled: true
  primary_provider: auto   # auto | google | ollama (auto uses Google when GOOGLE_API_KEY is set)
  confidence_threshold: 0.7
  timeout_seconds: 90       # screener prompts + Gemma thinking can exceed 30s
  watchlist_interval_minutes: 15   # 15 min safer for Google free tier (~12 RPM)
  google_model: gemma-4-31b-it
  google_thinking_level: MINIMAL
  google_rpm_limit: 12

execution:
  max_spread_pct: 0.03
  use_bracket_orders: true

ai_exit:
  enabled: true
  profit_trigger_pct: 0.40
  loss_trigger_pct: -0.06
  min_take_profit_pct: 0.20
  max_target_pct: 1.0
  max_hold_minutes: 20
  max_loss_hold_minutes: 8
  recheck_interval_bars: 5
  bar_context_count: 30
  hard_stop_loss_pct: 0.12

briefing:
  enabled: true
  time: "08:00"               # 8:00 AM CST = 9:00 AM ET
  news_lookback_hours: 24
  news_limit: 10

journal_context:
  enabled: true
  rsi_tolerance: 5
  lookback_days: 30
  min_trades_for_veto: 5
  min_win_rate: 0.4

screener:
  enabled: true
  mode: dynamic              # no fixed ETF anchors — diversify across screener picks
  anchor_symbols: []
  dynamic_slots: 12
  run_time: "07:45"           # 7:45 AM CST = 8:45 AM ET
  candidate_pool_size: 60
  min_price: 15.0
  max_price: 500.0
  min_volume: 1000000
  max_percent_change: 8.0
  exclude_sectors: []
  finnhub_enabled: true
  exclude_yesterday_losers: true

# Research data (Yahoo Finance) — screener, enrichment, warmup fallback
# Alpaca is still used for live stream, quotes during session, and order execution
research:
  provider: yahoo
  yahoo_enabled: true
  finnhub_fallback: true
  warmup_min_bars: 30

journal:
  db_path: data/trades.db
